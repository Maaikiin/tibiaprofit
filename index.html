<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibia Profit Tracker - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="login-body">
    <div class="login-container">
        <!-- Logo em Imagem Oficial -->
        <header class="tibia-logo-header">
            <img src="logo.png" alt="Tibia Profit Logo" class="tibia-logo-img">
        </header>

        <!-- Container do Pergaminho Horizontal -->
        <main class="scroll-container">
            <div class="scroll-content">
                <form id="loginForm">
                    <div class="scroll-input-group">
                        <label for="email">Account Name:</label>
                        <input type="email" id="email" required autocomplete="username">
                    </div>

                    <div class="scroll-input-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" required autocomplete="current-password">
                    </div>

                    <div class="scroll-buttons-col">
                        <button type="submit" id="btnLogin" class="scroll-btn">Login</button>
                        <button type="button" id="btnCadastro" class="scroll-btn">Register</button>
                    </div>
                </form>
                <p id="loginErro" class="scroll-error-msg" style="display: none;"></p>
            </div>
        </main>
    </div>

    <!-- Scripts do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script src="auth.js"></script>
    <footer style="text-align: center; padding: 20px; color: #64748b; font-family: sans-serif; font-size: 0.9rem; margin-top: 40px; border-top: 1px solid #334155;">
    <p style="margin: 0;">Feito por <strong>Maikiin</strong></p>
    <p style="margin: 5px 0 0 0;">Dúvidas, reclamações ou melhorias? Me procure in-game!</p>
    <img src="honesto.jpg" alt="Trabalho Honesto Meme" style="max-width: 300px; height: auto; margin-top: 15px; border: 2px solid #475569; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.5);">
</footer>
</body>
</html>
